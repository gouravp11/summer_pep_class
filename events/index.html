<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grandParent{
            height: 70%;
            width: 40%;
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #parent{
            height: 70%;
            width: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: yellow;
        }
        #child{
            height: 70%;
            width: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="grandParent">
        <div id="parent">
            <div id="child">

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
