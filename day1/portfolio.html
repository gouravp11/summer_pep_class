<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
      }

      header {
        background-color: #333;
        color: white;
        padding: 20px;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-right: 10px;
      }

      main {
        padding: 20px;
      }

      section {
        background-color: white;
        margin-bottom: 20px;
        padding: 20px;
        border: 1px solid #ddd;
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
      }

      input,
      textarea {
        width: 100%;
        max-width: 400px;
        padding: 8px;
        margin-top: 5px;
      }

      button {
        padding: 10px 20px;
        background-color: #333;
        color: white;
        border: none;
        cursor: pointer;
      }

      footer {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <h1>My Portfolio</h1>
        <a href="#about">About</a> | <a href="#skills">Skills</a> |
        <a href="#education">Education</a> | <a href="#project">Projects</a> |
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main>
      <section id="about">
        <h2>About</h2>
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=880&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Profile picture" />
        <p>Hello, I John Doe. I am learning web development.</p>
      </section>

      <section id="skills">
        <h2>Skills</h2>
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </section>

      <section id="education">
        <h2>Education</h2>
        <p>Bachelor of Technology, XYZ</p>
      </section>

      <section id="project">
        <h2>Projects</h2>
        <ul>
          <li>Personal Portfolio Website</li>
          <li>Calculator App</li>
        </ul>
      </section>

      <section id="contact">
        <h2>Contact</h2>
        <form>
          <label for="name">Name:</label><br />
          <input type="text" id="name" name="name" /><br /><br />

          <label for="email">Email:</label><br />
          <input type="email" id="email" name="email" /><br /><br />

          <label for="message">Message:</label><br />
          <textarea id="message" name="message"></textarea><br /><br />

          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 John Doe</p>
    </footer>
  </body>
</html>
